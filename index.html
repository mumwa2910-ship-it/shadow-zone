<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ShadowZone Offline V3</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-user-select:none;user-select:none}
body{font-family:'Arial',sans-serif;background:#0a0a0a;color:#fff;overflow:hidden}
.screen{position:absolute;width:100%;height:100%;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hidden{display:none!important}
button{padding:12px 24px;margin:8px;background:#ff3b30;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;width:80%;max-width:300px}
button:active{transform:scale(0.95)}
#lobby h1{font-size:32px;margin-bottom:20px;color:#ff3b30;text-shadow:0 0 20px #ff3b30}
.hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none;z-index:10}
.stat{background:rgba(0,0,0,0.7);padding:8px 12px;border-radius:8px;font-size:14px;font-weight:bold}
#canvas-container{position:absolute;width:100%;height:100%}
#game{width:100%;height:100%;display:block;background:#1a1a1a}
#joystick{position:absolute;bottom:30px;left:30px;width:120px;height:120px;background:rgba(255,255,255,0.1);border-radius:50%;z-index:20}
#joystick-knob{position:absolute;width:50px;height:50px;background:#ff3b30;border-radius:50%;top:35px;left:35px}
#shoot-btn{position:absolute;bottom:50px;right:50px;width:80px;height:80px;background:#ff3b30;border-radius:50%;z-index:20;font-size:24px}
#pause-btn{position:absolute;top:70px;right:20px;width:50px;height:50px;background:rgba(0,0,0,0.7);border-radius:50%;z-index:20}
#reload-btn{position:absolute;top:70px;left:20px;width:60px;height:40px;background:rgba(0,0,0,0.7);border-radius:8px;z-index:20;font-size:12px}
.crosshair{position:absolute;width:30px;height:30px;pointer-events:none;z-index:15}
.crosshair::before,.crosshair::after{content:'';position:absolute;background:#fff}
.crosshair::before{width:2px;height:30px;left:14px;top:0}
.crosshair::after{width:30px;height:2px;left:0;top:14px}
.enemy{filter:drop-shadow(0 0 10px #ff3b30)}
.bullet-trail{animation:fade 0.3s ease-out}
@keyframes fade{from{opacity:1}to{opacity:0}}
.game-over{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
</style>
</head>
<body>
<!-- === LOBBY === -->
<div id="lobby" class="screen">
  <h1>SHADOWZONE V3</h1>
  <button onclick="startGame()">PLAY</button>
  <button onclick="alert('Settings: Volume, Controls')">SETTINGS</button>
  <button onclick="alert('ShadowZone V3 by You')">CREDITS</button>
</div>

<!-- === GAME === -->
<div id="game-screen" class="screen hidden">
  <div class="hud">
    <div class="stat">HP: <span id="hp">100</span></div>
    <div class="stat">KILLS: <span id="kills">0</span></div>
    <div class="stat">AMMO: <span id="ammo">30/30</span></div>
  </div>
  <div id="canvas-container"><canvas id="game"></canvas></div>
  <div class="crosshair" style="top:50%;left:50%;margin:-15px 0 0 -15px"></div>
  <div id="joystick"><div id="joystick-knob"></div></div>
  <button id="shoot-btn">🔫</button>
  <button id="reload-btn" onclick="reload()">RELOAD</button>
  <button id="pause-btn" onclick="pauseGame()">||</button>
</div>

<!-- === GAME OVER === -->
<div id="game-over" class="screen hidden game-over">
  <h1 style="color:#ff3b30;font-size:40px;margin-bottom:20px">GAME OVER</h1>
  <div style="font-size:20px;margin-bottom:20px">KILLS: <span id="final-kills">0</span></div>
  <button onclick="restartGame()">RESTART</button>
  <button onclick="backToLobby()">LOBBY</button>
</div>

<script>
// === AUDIO SYSTEM ===
let audioCtx;
function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function playSound(type){
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if(type==='shoot'){osc.frequency.value=800;gain.gain.setValueAtTime(0.3,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.1);osc.start();osc.stop(audioCtx.currentTime+0.1);}
  if(type==='hit'){osc.frequency.value=200;gain.gain.setValueAtTime(0.4,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.2);osc.start();osc.stop(audioCtx.currentTime+0.2);}
  if(type==='kill'){osc.frequency.value=400;osc.type='square';gain.gain.setValueAtTime(0.5,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.3);osc.start();osc.stop(audioCtx.currentTime+0.3);}
  if(type==='reload'){osc.frequency.value=600;gain.gain.setValueAtTime(0.3,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.4);osc.start();osc.stop(audioCtx.currentTime+0.4);}
}

// === GAME STATE ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let gameState = 'lobby';
let player = {x:200,y:200,hp:100,maxHp:100,ammo:30,maxAmmo:30,speed:3};
let kills = 0;
let enemies = [];
let bullets = [];
let particles = [];
let keys = {};
let joystick = {active:false,x:0,y:0};

// === CANVAS SETUP ===
function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  player.x = canvas.width/2;
  player.y = canvas.height/2;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// === GAME FLOW ===
function startGame(){
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  gameState = 'playing';
  resetGame();
  spawnWave();
  gameLoop();
}

function pauseGame(){
  if(gameState==='playing'){gameState='paused';}
  else if(gameState==='paused'){gameState='playing';gameLoop();}
}

function restartGame(){
  document.getElementById('game-over').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  startGame();
}

function backToLobby(){
  document.getElementById('game-over').classList.add('hidden');
  document.getElementById('lobby').classList.remove('hidden');
  gameState='lobby';
}

function resetGame(){
  player={x:canvas.width/2,y:canvas.height/2,hp:100,maxHp:100,ammo:30,maxAmmo:30,speed:3};
  kills=0;enemies=[];bullets=[];particles=[];
  updateHUD();
}

// === ENEMIES ===
function spawnWave(){
  const count = 5 + Math.floor(kills/3);
  for(let i=0;i<count;i++){
    let x,y;
    do{x=Math.random()*canvas.width;y=Math.random()*canvas.height;}
    while(Math.hypot(x-player.x,y-player.y)<150);
    enemies.push({x,y,hp:30,maxHp:30,speed:1+Math.random(),color:'#ff3b30'});
  }
}

// === COMBAT ===
function shoot(){
  if(player.ammo>0&&gameState==='playing'){
    player.ammo--;
    playSound('shoot');
    const angle=Math.atan2(0,1);
    bullets.push({x:player.x,y:player.y,vx:8,vy:0,life:60});
    updateHUD();
  }
}

function reload(){
  if(player.ammo<player.maxAmmo&&gameState==='playing'){
    playSound('reload');
    player.ammo=player.maxAmmo;
    updateHUD();
  }
}

function damageEnemy(e, dmg){
  e.hp-=dmg;
  playSound('hit');
  createParticles(e.x,e.y,'#ff3b30');
  if(e.hp<=0){
    playSound('kill');
    kills++;
    enemies=enemies.filter(en=>en!==e);
    updateHUD();
    if(enemies.length===0) spawnWave();
  }
}

function createParticles(x,y,color){
  for(let i=0;i<8;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:20,color});
  }
}

// === HUD ===
function updateHUD(){
  document.getElementById('hp').textContent=player.hp;
  document.getElementById('kills').textContent=kills;
  document.getElementById('ammo').textContent=`${player.ammo}/${player.maxAmmo}`;
  document.getElementById('final-kills').textContent=kills;
}

// === GAME LOOP ===
function gameLoop(){
  if(gameState!=='playing') return;

  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  updatePlayer();
  updateEnemies();
  updateBullets();
  updateParticles();
  checkCollisions();
  drawPlayer();
  drawEnemies();
  drawBullets();
  drawParticles();

  if(player.hp<=0) gameOver();

  requestAnimationFrame(gameLoop);
}

function updatePlayer(){
  if(joystick.active){
    player.x+=joystick.x*player.speed;
    player.y+=joystick.y*player.speed;
  }
  player.x=Math.max(15,Math.min(canvas.width-15,player.x));
  player.y=Math.max(15,Math.min(canvas.height-15,player.y));
}

function updateEnemies(){
  enemies.forEach(e=>{
    const angle=Math.atan2(player.y-e.y,player.x-e.x);
    e.x+=Math.cos(angle)*e.speed;
    e.y+=Math.sin(angle)*e.speed;
    if(Math.hypot(player.x-e.x,player.y-e.y)<30){
      player.hp-=0.5;
      updateHUD();
    }
  });
}

function updateBullets(){
  bullets.forEach((b,i)=>{
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0||b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
      bullets.splice(i,1);
    }
  });
}

function updateParticles(){
  particles.forEach((p,i)=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0) particles.splice(i,1);
  });
}

function checkCollisions(){
  bullets.forEach((b,bi)=>{
    enemies.forEach(e=>{
      if(Math.hypot(b.x-e.x,b.y-e.y)<20){
        damageEnemy(e,30);
        bullets.splice(bi,1);
      }
    });
  });
}

function drawPlayer(){
  ctx.fillStyle='#00ff00';
  ctx.fillRect(player.x-15,player.y-15,30,30);
  ctx.fillStyle='#fff';
  ctx.fillRect(player.x-2,player.y-15,4,10);
}

function drawEnemies(){
  ctx.fillStyle='#ff3b30';
  enemies.forEach(e=>{
    ctx.fillRect(e.x-12,e.y-12,24,24);
    ctx.fillStyle='#000';
    ctx.fillRect(e.x-10,e.y-18,(e.hp/e.maxHp)*20,4);
    ctx.fillStyle='#ff3b30';
  });
}

function drawBullets(){
  ctx.fillStyle='#ffff00';
  bullets.forEach(b=>{
    ctx.fillRect(b.x-3,b.y-3,6,6);
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life/20;
    ctx.fillRect(p.x-2,p.y-2,4,4);
    ctx.globalAlpha=1;
  });
}

function gameOver(){
  gameState='over';
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('game-over').classList.remove('hidden');
}

// === CONTROLS ===
document.getElementById('shoot-btn').addEventListener('touchstart',e=>{e.preventDefault();shoot();});
document.getElementById('shoot-btn').addEventListener('mousedown',e=>{e.preventDefault();shoot();});

const joy=document.getElementById('joystick');
const knob=document.getElementById('joystick-knob');

joy.addEventListener('touchstart',e=>{
  joystick.active=true;
  const rect=joy.getBoundingClientRect();
  const touch=e.touches[0];
  const x=touch.clientX-rect.left-60;
  const y=touch.clientY-rect.top-60;
  const dist=Math.min(35,Math.hypot(x,y));
  const angle=Math.atan2(y,x);
  joystick.x=Math.cos(angle)*dist/35;
  joystick.y=Math.sin(angle)*dist/35;
  knob.style.left=35+joystick.x*35+'px';
  knob.style.top=35+joystick.y*35+'px';
});

joy.addEventListener('touchmove',e=>{
  if(!joystick.active) return;
  const rect=joy.getBoundingClientRect();
  const touch=e.touches[0];
  const x=touch.clientX-rect.left-60;
  const y=touch.clientY-rect.top-60;
  const dist=Math.min(35,Math.hypot(x,y));
  const angle=Math.atan2(y,x);
  joystick.x=Math.cos(angle)*dist/35;
  joystick.y=Math.sin(angle)*dist/35;
  knob.style.left=35+joystick.x*35+'px';
  knob.style.top=35+joystick.y*35+'px';
});

joy.addEventListener('touchend',()=>{
  joystick.active=false;
  joystick.x=0;joystick.y=0;
  knob.style.left='35px';
  knob.style.top='35px';
});

// === PWA ===
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
  </html>
