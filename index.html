<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Stick-R V4</title>
<link rel="manifest" href="manifest.json">
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:Arial;color:#fff}
canvas{display:block;background:#1a2a1a}
#ui{position:fixed;top:10px;left:0;right:0;text-align:center;font-weight:bold;text-shadow:2px 2px 4px #000;font-size:18px;pointer-events:none}
#btn{position:fixed;bottom:20px;right:20px;width:70px;height:70px;border-radius:50%;background:rgba(255,0,0,.8);border:3px solid #fff;color:#fff;font-weight:bold}
#joy{position:fixed;bottom:20px;left:20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid #fff}
#stick{position:absolute;width:40px;height:40px;border-radius:50%;background:#fff;top:30px;left:30px;pointer-events:none}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:bold;text-shadow:3px 3px 6px #000;display:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">HP:100 | KILLS:0 | GUN:None | ZONE:Safe</div>
<div id="joy"><div id="stick"></div></div>
<button id="btn">SHOOT</button>
<div id="msg"></div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const W=innerWidth,H=innerHeight;c.width=W;c.height=H;
const audio=new AudioContext();
const beep=f=>{const o=audio.createOscillator(),g=audio.createGain();o.frequency.value=f;o.connect(g);g.connect(audio.destination);g.gain.setValueAtTime(.3,audio.currentTime);g.gain.exponentialRampToValueAtTime(.01,audio.currentTime+.1);o.start();o.stop(audio.currentTime+.1)};
const S={hp:100,kills:0,gun:null,phase:'drop',x:W/2,y:-200,vx:0,vy:3,parachute:true,zone:W/2,size:W*.8};

let joy={x:0,y:0},enemies=[],boxes=[],bullets=[];
for(let i=0;i<8;i++){enemies.push({x:Math.random()*W,y:Math.random()*H,hp:30,gun:['Pistol','Shotgun'][i%2]})}
for(let i=0;i<12;i++){boxes.push({x:Math.random()*W,y:Math.random()*H,type:['Pistol','Shotgun','Armor'][i%3],taken:0})}

onpointermove=e=>{if(S.phase!='drop'){const r=e.clientX-20,j=e.clientY-H+20,d=Math.min(40,Math.hypot(r-50,j-50));joy.x=(r-50)/40*d;joy.y=(j-50)/40*d;const s=document.getElementById('stick');s.style.left=30+joy.x+'px';s.style.top=30+joy.y+'px'}};
document.getElementById('btn').onclick=()=>{if(S.phase=='fight'&&S.gun){beep(800);bullets.push({x:S.x,y:S.y,dx:joy.x||1,dy:joy.y||0})}};

function loop(){
 x.fillStyle='#1a2a1a';x.fillRect(0,0,W,H);
 
 if(S.phase=='drop'){
  S.y+=S.vy;S.x+=S.vx;
  if(joy.x){S.vx=joy.x*.2}
  if(S.y>H-100){S.phase='fight';S.y=H-100;S.parachute=0;document.getElementById('msg').style.display='none'}
  x.strokeStyle='#fff';x.lineWidth=2;x.beginPath();x.arc(S.x,S.y,15,0,6.28);x.stroke(); // head
  x.beginPath();x.moveTo(S.x,S.y+15);x.lineTo(S.x,S.y+35);x.stroke(); // body
  if(S.parachute){x.fillStyle='rgba(255,255,255,.7)';x.beginPath();x.arc(S.x,S.y-20,25,0,3.14);x.fill()}
  document.getElementById('msg').textContent='DROP IN';document.getElementById('msg').style.display='block';
 }
 
 if(S.phase=='fight'){
  S.x+=joy.x*.8;S.y+=joy.y*.8;
  S.size-=.2;if(S.size<100)S.size=100;
  const d=Math.hypot(S.x-W/2,S.y-H/2);
  if(d>S.size/2){S.hp-=.2;document.getElementById('ui').style.color='red'}else{document.getElementById('ui').style.color='#fff'}
  
  x.strokeStyle='rgba(255,0,0,.3)';x.lineWidth=4;x.beginPath();x.arc(W/2,H/2,S.size/2,0,6.28);x.stroke();
  
  boxes.forEach(b=>{if(!b.taken){x.fillStyle='#8B4513';x.fillRect(b.x-10,b.y-10,20,20);if(Math.hypot(S.x-b.x,S.y-b.y)<20){b.taken=1;S.gun=b.type;if(b.type=='Armor')S.hp=Math.min(100,S.hp+30);beep(600)}}});
  
  enemies.forEach(e=>{if(e.hp>0){const dx=S.x-e.x,dy=S.y-e.y,dist=Math.hypot(dx,dy);if(dist>30){e.x+=dx/dist*.5;e.y+=dy/dist*.5}x.strokeStyle='red';x.beginPath();x.arc(e.x,e.y,15,0,6.28);x.stroke();x.beginPath();x.moveTo(e.x,e.y+15);x.lineTo(e.x,e.y+35);x.stroke();if(dist<40&&Math.random()<.01){S.hp-5;beep(300)}}});
  
  bullets.forEach((b,i)=>{b.x+=b.dx*5;b.y+=b.dy*5;x.fillStyle='yellow';x.fillRect(b.x,5,b.y,5);enemies.forEach(e=>{if(e.hp>0&&Math.hypot(b.x-e.x,b.y-e.y)<15){e.hp=0;S.kills++;beep(1200);bullets.splice(i,1)}})});
  
  x.strokeStyle='#0f0';x.lineWidth=2;x.beginPath();x.arc(S.x,S.y,15,0,6.28);x.stroke();
  x.beginPath();x.moveTo(S.x,S.y+15);x.lineTo(S.x,S.y+35);x.stroke();
 }
 
 document.getElementById('ui').textContent=`HP:${S.hp|0} | KILLS:${S.kills} | GUN:${S.gun||'None'} | ZONE:${S.size|0}`;
 if(S.hp<=0){document.getElementById('msg').textContent='YOU DIED';document.getElementById('msg').style.display='block'}
 requestAnimationFrame(loop);
}
loop();

if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js')}
</script>
</body>
</html>
