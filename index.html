<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Stick-R V4.1</title>
<link rel="manifest" href="manifest.json">
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:Arial;color:#fff;touch-action:none}
canvas{display:block;background:#2a3a2a}
#ui{position:fixed;top:10px;left:0;right:0;text-align:center;font-weight:bold;text-shadow:2px 2px 4px #000;font-size:16px}
#btn{position:fixed;bottom:20px;right:20px;width:70px;height:70px;border-radius:50%;background:rgba(255,0,0,.8);border:3px solid #fff;color:#fff;font-weight:bold;font-size:12px}
#joy{position:fixed;bottom:20px;left:20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid #fff}
#stick{position:absolute;width:40px;height:40px;border-radius:50%;background:#fff;top:30px;left:30px;pointer-events:none}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:bold;text-shadow:3px 3px 6px #000}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">HP:100 | KILLS:0 | GUN:None</div>
<div id="joy"><div id="stick"></div></div>
<button id="btn">SHOOT/CUT</button>
<div id="msg">DROP IN</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const W=innerWidth,H=innerHeight;c.width=W;c.height=H;
const audio=new AudioContext();
const beep=f=>{const o=audio.createOscillator(),g=audio.createGain();o.frequency.value=f;o.connect(g);g.connect(audio.destination);g.gain.setValueAtTime(.2,audio.currentTime);g.gain.exponentialRampToValueAtTime(.01,audio.currentTime+.1);o.start();o.stop(audio.currentTime+.1)};

const P={x:W/2,y:-150,vx:0,vy:1.5,hp:100,kills:0,gun:null,landed:0};
let joy={x:0,y:0},enemies=[],boxes=[],bullets=[];
for(let i=0;i<6;i++)boxes.push({x:50+Math.random()*(W-100),y:H-300-Math.random()*200,type:['Pistol','Armor'][i%2],taken:0});

const joyEl=document.getElementById('joy');
joyEl.onpointermove=joyEl.onpointerdown=e=>{const r=joyEl.getBoundingClientRect(),dx=e.clientX-r.left-50,dy=e.clientY-r.top-50,d=Math.min(40,Math.hypot(dx,dy));joy.x=dx/d*40;joy.y=dy/d*40;document.getElementById('stick').style.left=30+joy.x+'px';document.getElementById('stick').style.top=30+joy.y+'px'};
joyEl.onpointerup=()=>{joy.x=0;joy.y=0;document.getElementById('stick').style.left='30px';document.getElementById('stick').style.top='30px'};

document.getElementById('btn').onclick=()=>{if(P.landed&&P.gun){beep(900);bullets.push({x:P.x,y:P.y,dx:joy.x||1,dy:joy.y||0})}if(!P.landed){P.vy=5;P.parachute=0}};

function drawStick(px,py,col){x.strokeStyle=col;x.lineWidth=3;x.beginPath();x.arc(px,py,12,0,6.28);x.stroke();x.beginPath();x.moveTo(px,py+12);x.lineTo(px,py+32);x.moveTo(px,py+20);x.lineTo(px-10,py+25);x.moveTo(px,py+20);x.lineTo(px+10,py+25);x.moveTo(px,py+32);x.lineTo(px-8,py+45);x.moveTo(px,py+32);x.lineTo(px+8,py+45);x.stroke()}

function loop(){
 x.fillStyle='#2a3a2a';x.fillRect(0,0,W,H);

 if(!P.landed){
  P.x+=joy.x*.3;P.y+=P.vy;
  if(P.y>H-120){P.landed=1;document.getElementById('msg').textContent='LANDED';setTimeout(()=>document.getElementById('msg').style.display='none',1000)}
  if(P.parachute!==0){x.fillStyle='rgba(255,255,255,.6)';x.beginPath();x.arc(P.x,P.y-25,22,0,3.14);x.fill()}
  drawStick(P.x,P.y,'#fff');
 }

 if(P.landed){
  P.x+=joy.x*.7;P.y+=joy.y*.7;
  P.x=Math.max(20,Math.min(W-20,P.x));P.y=Math.max(20,Math.min(H-20,P.y));

  boxes.forEach(b=>{if(!b.taken){x.fillStyle=b.type=='Armor'?'#FFD700':'#FFA500';x.shadowColor='#FFA500';x.shadowBlur=10;x.fillRect(b.x-15,b.y-15,30,30);x.shadowBlur=0;x.fillStyle='#000';x.font='10px Arial';x.fillText(b.type[0],b.x-3,b.y+3);if(Math.hypot(P.x-b.x,P.y-b.y)<25){b.taken=1;P.gun=P.gun||b.type;if(b.type=='Armor')P.hp=Math.min(100,P.hp+30);beep(700);if(enemies.length==0){for(let i=0;i<3;i++)enemies.push({x:Math.random()*W,y:Math.random()*H,hp:30})}}}});

  enemies.forEach(e=>{if(e.hp>0){const dx=P.x-e.x,dy=P.y-e.y,dist=Math.hypot(dx,dy);if(dist>35){e.x+=dx/dist*.4;e.y+=dy/dist*.4}drawStick(e.x,e.y,'red');if(dist<30&&Math.random()<.008){P.hp-3;beep(250)}}});

  bullets.forEach((b,i)=>{b.x+=b.dx*6;b.y+=b.dy*6;x.fillStyle='yellow';x.fillRect(b.x-3,b.y-3,6,6);enemies.forEach(e=>{if(e.hp>0&&Math.hypot(b.x-e.x,b.y-e.y)<15){e.hp=0;P.kills++;beep(1300);bullets.splice(i,1)}})});

  drawStick(P.x,P.y,'#0f0');
 }

 document.getElementById('ui').textContent=`HP:${P.hp|0} | KILLS:${P.kills} | GUN:${P.gun||'None'}`;
 if(P.hp<=0){document.getElementById('msg').textContent='YOU DIED';document.getElementById('msg').style.display='block';return}
 requestAnimationFrame(loop);
}
loop();
if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js')}
</script>
</body>
</html>
