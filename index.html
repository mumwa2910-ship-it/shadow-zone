<head>

<canvas id="game"></canvas>
<script>const c=document.getElementById('game');c.width=innerWidth;c.height=innerHeight;const ctx=c.getContext('2d');ctx.fillStyle='#ff3b30';ctx.font='32px Arial';ctx.textAlign='center';ctx.fillText('SHADOWZONE V3 IS LIVE',c.width/2,c.height/2);</script>
